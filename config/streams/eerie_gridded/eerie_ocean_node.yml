EERIE_OCEAN_NODE:  
  type: mesh
  stream_id: 2138
  loss_weight: 0.1
  filenames:
  - /work/ab0995/a270225/data_transformation/eerie_ocean_gr025_2d_gridded_daily.parq
  source:
  - avg_tos # sea surface temperature
  - avg_sos # sea surface salinity
  - avg_zos # sea surface height
  target:
  - avg_tos
  - avg_sos
  - avg_zos
  location_weight : cosine_latitude
  sampling_mode: 'global_sparse' # loads given number of random points globally for each time step. 
  sample_points: 32768 
  masking_rate : 0.6
  masking_rate_none : 0.05
  token_size : 32
  tokenize_spacetime : True
  max_num_targets: -1 
  embed : 
    net : transformer
    num_tokens : 1
    num_heads : 8
    dim_embed : 256
    num_blocks : 2
  embed_target_coords :
    net : linear
    dim_embed : 256
  target_readout :
    num_layers : 2
    num_heads : 4
    # sampling_rate : 0.2
  pred_head :
    ens_size : 1
    num_layers : 1
