freeze_modules: ".*global.*|.*local.*|.*adapter.*|.*q_cells.*|.*latent.*|.*ERA5ml.*|.*ERA5pl.*"

general:

  # mutable parameters
  istep: 0
  rank: ???
  world_size: ???

  multiprocessing_method: "fork"

  desc: ""
  run_id: ???
  run_history: []

# config for training
training_config:

  training_mode: ["masking"]

  num_mini_epochs: 32

  start_date: 1979-01-01T00:00
  end_date: 2012-12-31T00:00

  learning_rate_scheduling:
    lr_start: 1e-6
    lr_max: 5e-5
    lr_final_decay: 2e-6
    lr_final: 0.0
    num_steps_warmup: 256
    num_steps_cooldown: 512
    policy_warmup: "cosine"
    policy_decay: "cosine"
    policy_cooldown: "linear"
    parallel_scaling_policy: "sqrt"

  forecast:
    time_step: 06:00:00
    offset: 1
    num_steps: 8
    policy: "fixed"